{{ with .Site.Params.ibom }}
<div class="viewer-wrap">
  {{ partial "fullscreen-btn.html" $ }}
  <iframe class="ibom-viewer" src="{{ $.Site.BaseURL }}{{ . }}" title="Interactive BOM"></iframe>
</div>
<script>
  (function() {
    var iframe = document.querySelector('.ibom-viewer');
    function syncTheme() {
      try {
        var dark = document.documentElement.classList.contains('dark');
        var body = iframe.contentDocument.querySelector('.topmostdiv');
        if (body) body.classList.toggle('dark', dark);
      } catch(e) {}
    }
    iframe.addEventListener('load', syncTheme);
    new MutationObserver(syncTheme).observe(document.documentElement, {attributes: true, attributeFilter: ['class']});
  })();
</script>
{{ end }}
